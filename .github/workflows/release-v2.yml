name: Release

# Triggers on tag push, e.g. `git tag 0.0.7 && git push origin 0.0.7`.
# Builds composer (no-dev) + the admin SPA, packages everything into a
# turnkey zip using .distignore, and attaches it to a GitHub Release.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  # Manual fallback: `gh workflow run release.yml --ref <tag>`. Runs against
  # the chosen tag ref, so GITHUB_REF stays `refs/tags/<tag>` and the
  # tag-vs-VERSION guard below keeps working unchanged. Useful when a
  # tag-push event silently fails to trigger (rare GitHub backend glitch).
  workflow_dispatch: {}

permissions:
  contents: write   # required to create the Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches cms/VERSION
        # Releases ship `cms/VERSION` to disk; `Updater::currentVersion()`
        # reads it at runtime to compute "update available". If the pushed
        # tag and the on-disk file disagree, every install from this zip
        # would compare wrong against future tags (banner shows when it
        # shouldn't, or never shows when it should). Fail loud so the
        # author has to bump the file first.
        #
        # Both `0.0.90` and `v0.0.90` style tags are accepted to match the
        # workflow trigger filter above.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          FILE="$(cat cms/VERSION | tr -d '[:space:]')"
          if [ "$TAG" != "$FILE" ] && [ "$TAG" != "v$FILE" ]; then
            echo "::error::Tag '$TAG' does not match cms/VERSION ('$FILE'). Bump cms/VERSION to match the tag (or vice versa) and re-tag."
            exit 1
          fi
          echo "Tag '$TAG' matches cms/VERSION '$FILE'."

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Composer install (no dev)
        working-directory: cms
        run: composer install --no-dev --optimize-autoloader --classmap-authoritative --no-interaction --no-progress

      - name: NPM install
        working-directory: src
        run: npm ci --no-audit --no-fund

      - name: Build admin SPA
        working-directory: src
        run: npm run build

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "package=frontpress-studio-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package release zip
        run: |
          # rsync's --exclude-from doesn't skip '#' comments or blank lines,
          # so preprocess .distignore into a clean pattern list.
          grep -vE '^(#|$)' .distignore > /tmp/excludes

          PKG="${{ steps.version.outputs.package }}"
          OUT="release/${PKG}"
          mkdir -p "${OUT}"

          rsync -a \
            --exclude-from=/tmp/excludes \
            --exclude='.git/' \
            --exclude='release/' \
            ./ "${OUT}/"

          # -y preserves symlinks (default zip behavior dereferences them,
          # turning assets -> site/themes/blank/assets into a real
          # directory of stale files). Modern unzip on macOS/Linux extracts
          # the link correctly. Windows users will see a regular file
          # containing the link target — bootstrap.php's
          # ThemeService::ensureAssetsLink() catches that on first request.
          ( cd release && zip -ryq "${PKG}.zip" "${PKG}" )
          ls -lh "release/${PKG}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ steps.version.outputs.package }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
