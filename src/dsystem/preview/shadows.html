<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Shadows</title></head><body style="background:#fafafa">
<div class="eyebrow">Elevation · subtle, structural</div>
<div class="row" style="gap:24px;padding:16px 8px 24px">
  <div style="text-align:center">
    <div style="width:140px;height:70px;background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05)"></div>
    <div class="small mono" style="margin-top:8px">shadow-sm</div>
    <div class="small">card resting</div>
  </div>
  <div style="text-align:center">
    <div style="width:140px;height:70px;background:#fff;border-radius:8px;box-shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05)"></div>
    <div class="small mono" style="margin-top:8px">shadow-md</div>
    <div class="small">card hover</div>
  </div>
  <div style="text-align:center">
    <div style="width:140px;height:70px;background:#fff;border-radius:8px;box-shadow:0 16px 40px rgba(0,0,0,.12)"></div>
    <div class="small mono" style="margin-top:8px">shadow-lg</div>
    <div class="small">modal / toast</div>
  </div>
</div>
</body></html>
